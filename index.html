<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Cartão de Visita</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <form id="formCartao">
      <h2>Dados do Cartão</h2>
      <label>Nome: <input type="text" id="nome"></label>
      <label>Profissão: <input type="text" id="profissao"></label>
      <label>Email: <input type="text" id="email"></label>
      <label>Telefone: <input type="text" id="telefone"></label>

      <h3>Imagens</h3>
      <label>Imagem de Fundo: <input type="file" id="bg" accept="image/*"></label>
      <button type="button" id="btnExcluirFundo">Excluir Fundo</button>

      <label>Logo Frente: <input type="file" id="logo1" accept="image/*"></label>
      <button type="button" id="btnExcluirLogo1">Excluir Logo Frente</button>

      <label>Logo Verso: <input type="file" id="logo2" accept="image/*"></label>
      <button type="button" id="btnExcluirLogo2">Excluir Logo Verso</button>

      <h3>Configuração da Folha</h3>
      <label>Largura do cartão (mm): <input type="number" id="largura" value="90"></label>
      <label>Altura do cartão (mm): <input type="number" id="altura" value="50"></label>
      <label>Colunas: <input type="number" id="colunas" value="3"></label>
      <label>Linhas: <input type="number" id="linhas" value="4"></label>
      <label>Margem esquerda (mm): <input type="number" id="margemEsq" value="10"></label>
      <label>Margem topo (mm): <input type="number" id="margemTopo" value="10"></label>

      <h3>Ajuste do Verso</h3>
      <label>Deslocamento X (mm): <input type="number" id="offsetX" value="0"></label>
      <label>Deslocamento Y (mm): <input type="number" id="offsetY" value="0"></label>

      <h3>Salvar/Carregar Dados</h3>
      <button type="button" id="btnExportTXT">Exportar TXT</button>
      <input type="file" id="btnImportTXT" accept=".txt">

      <h3>Exportação</h3>
      <button type="button" id="exportar">Exportar PDF</button>
    </form>

    <div class="preview">
      <h2>Preview</h2>
      <div class="cartao frente" id="frente">
        <h1 id="prevNome"></h1>
        <p id="prevProfissao"></p>
        <img id="prevLogo1" class="draggable" style="position:absolute; max-width:80px; max-height:80px;">
      </div>
      <div class="cartao verso" id="verso">
        <p id="prevEmail"></p>
        <p id="prevTelefone"></p>
        <img id="prevLogo2" class="draggable" style="position:absolute; max-width:80px; max-height:80px;">
      </div>
    </div>
  </div>

  <!-- Biblioteca jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Script principal -->
  <script src="script.js"></script>
</body>
</html>
